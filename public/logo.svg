<svg xmlns="http://www.w3.org/2000/svg" width="160" height="36" viewBox="0 0 160 36" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Icon background rounded square -->
  <rect x="0" y="0" width="36" height="36" rx="8" fill="url(#bgGrad)"/>

  <!-- Phone body -->
  <rect x="11" y="7" width="14" height="22" rx="2" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1"/>
  <rect x="12.5" y="9" width="11" height="15" rx="1.5" fill="white"/>

  <!-- Phone screen text -->
  <text x="18" y="20" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="8" fill="#2563eb">Ar</text>

  <!-- Left coin -->
  <circle cx="8" cy="28" r="3.5" fill="white" opacity="0.85"/>
  <line x1="8" y1="27.2" x2="8" y2="29.2" stroke="#2563eb" stroke-width="0.5" opacity="0.6"/>
  <line x1="7" y1="28" x2="9" y2="28" stroke="#2563eb" stroke-width="0.5" opacity="0.6"/>

  <!-- Right coin -->
  <circle cx="28" cy="16" r="3.5" fill="white" opacity="0.85"/>
  <line x1="28" y1="15.2" x2="28" y2="17.2" stroke="#2563eb" stroke-width="0.5" opacity="0.6"/>
  <line x1="27" y1="16" x2="29" y2="16" stroke="#2563eb" stroke-width="0.5" opacity="0.6"/>

  <!-- Text: M-Money -->
  <text x="46" y="18" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="800" font-size="16" fill="url(#textGrad)" letter-spacing="-0.3">M-Money</text>

  <!-- Text: Pro -->
  <text x="46" y="32" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-weight="600" font-size="9" fill="#60a5fa" letter-spacing="1.5">PRO</text>

  <!-- Decorative line -->
  <line x1="44" y1="23" x2="155" y2="23" stroke="#334155" stroke-width="0.5" opacity="0.4"/>
</svg>
