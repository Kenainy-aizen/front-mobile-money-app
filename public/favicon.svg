<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="24" cy="24" r="16.5" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Phone body -->
  <rect x="17" y="12" width="14" height="24" rx="2.5" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.2"/>
  <rect x="18.5" y="14" width="11" height="17" rx="1.5" fill="white"/>

  <!-- Phone screen - money symbol -->
  <text x="24" y="26" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="11" fill="#2563eb">Ar</text>

  <!-- Coins / cash flow indicator -->
  <circle cx="14" cy="32" r="4" fill="white" opacity="0.9"/>
  <circle cx="34" cy="22" r="4" fill="white" opacity="0.9"/>

  <!-- Arrow right -->
  <path d="M18 32 L21 32 M20 30 L21 32 L20 34" stroke="#2563eb" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Arrow left -->
  <path d="M30 22 L27 22 M28 20 L27 22 L28 24" stroke="#2563eb" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Dollar/coin accent lines -->
  <line x1="14" y1="31.2" x2="14" y2="33.2" stroke="white" stroke-width="0.6" opacity="0.6"/>
  <line x1="13" y1="32" x2="15" y2="32" stroke="white" stroke-width="0.6" opacity="0.6"/>
  <line x1="34" y1="21.2" x2="34" y2="23.2" stroke="white" stroke-width="0.6" opacity="0.6"/>
  <line x1="33" y1="22" x2="35" y2="22" stroke="white" stroke-width="0.6" opacity="0.6"/>
</svg>
